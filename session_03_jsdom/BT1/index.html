<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sinh Viên</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <h1>Hệ Thống Quản Lý Sinh Viên</h1>
            <p class="subtitle">Quản lý thông tin sinh viên, điểm số và thống kê lớp học</p>
        </header>

        <section class="control-section">
            <button id="btnAddStudent" class="btn btn-primary">+ Thêm Sinh Viên</button>
        </section>

        <div id="messageArea" class="message-area">
            <span id="messageText"></span>
            <button id="messageClose" class="message-close">&times;</button>
        </div>

        <section class="statistics-section">
            <div class="stat-card">
                <h3>Tổng Số Sinh Viên</h3>
                <p id="totalStudents" class="stat-value">0</p>
            </div>
            <div class="stat-card">
                <h3>Điểm Trung Bình</h3>
                <p id="averageGrade" class="stat-value">0.00</p>
            </div>
        </section>

        <section class="table-section">
            <table id="studentTable" class="student-table">
                <thead>
                    <tr>
                        <th>Mã SV</th>
                        <th>Họ Và Tên</th>
                        <th>Ngày Sinh</th>
                        <th>Lớp Học</th>
                        <th>Điểm TB</th>
                        <th>Email</th>
                        <th>Thao Tác</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <tr class="empty-row">
                        <td colspan="7" class="text-center">Chưa có dữ liệu sinh viên</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>

    <div id="studentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm Sinh Viên Mới</h2>
                <button id="btnCloseModal" class="modal-close">&times;</button>
            </div>
            <form id="studentForm" class="student-form">
                <div class="form-group">
                    <label for="studentId">Mã Sinh Viên</label>
                    <input type="text" id="studentId" required placeholder="VD: SV001">
                </div>

                <div class="form-group">
                    <label for="studentName">Họ Và Tên</label>
                    <input type="text" id="studentName" required placeholder="Nhập họ và tên">
                </div>

                <div class="form-group">
                    <label for="studentDob">Ngày Sinh</label>
                    <input type="date" id="studentDob" required>
                </div>

                <div class="form-group">
                    <label for="studentClass">Lớp Học</label>
                    <input type="text" id="studentClass" required placeholder="VD: CNTT01">
                </div>

                <div class="form-group">
                    <label for="studentGrade">Điểm Trung Bình</label>
                    <input type="number" id="studentGrade" required min="0" max="10" step="0.1" placeholder="0-10">
                </div>

                <div class="form-group">
                    <label for="studentEmail">Email</label>
                    <input type="email" id="studentEmail" required placeholder="example@email.com">
                </div>

                <div class="form-actions">
                    <button type="submit" id="btnSubmit" class="btn btn-primary">Lưu Lại</button>
                    <button type="button" id="btnCancel" class="btn btn-secondary">Hủy</button>
                </div>
            </form>
        </div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content modal-confirm">
            <h2>Xác Nhận Xóa</h2>
            <p id="confirmMessage">Bạn có chắc chắn muốn xóa sinh viên này?</p>
            <div class="form-actions">
                <button id="btnConfirmYes" class="btn btn-danger">Xóa</button>
                <button id="btnConfirmNo" class="btn btn-secondary">Hủy</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
